<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BHARATIYA ITIHAS | Epic Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Philosopher:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --warrior-gold: #FFD700;
            --deep-blood: #8B0000;
            --battle-bg: #0A0A0A;
            --saffron-glow: linear-gradient(135deg, #FF8C00 0%, #D35400 100%);
            --glass: rgba(15, 23, 42, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--battle-bg); 
            color: #E2E8F0;
            background-image: radial-gradient(circle at top, #331a00 0%, #0a0a0a 100%);
            background-attachment: fixed;
        }

        /* --- CINEMATIC INTRO --- */
        #splash {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 1.2s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .dharmachakra { width: 80px; height: 80px; border: 3px double var(--warrior-gold); border-radius: 50%; animation: spin 10s linear infinite; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .intro-msg { margin-top: 25px; font-family: 'Philosopher', sans-serif; font-size: 22px; color: var(--warrior-gold); letter-spacing: 4px; }
        .splash-hidden { opacity: 0; transform: translateY(-100%); pointer-events: none; }

        /* --- BOLD WELCOME --- */
        .welcome-header { padding: 50px 25px 30px 25px; text-align: center; }
        .welcome-header h2 { font-size: 12px; letter-spacing: 5px; color: var(--warrior-gold); margin-bottom: 5px; opacity: 0.8; }
        .welcome-header h1 { font-family: 'Philosopher', sans-serif; font-size: 36px; font-weight: 800; color: white; text-shadow: 0 0 20px rgba(211, 84, 0, 0.5); }

        header { padding: 15px 25px; background: var(--glass); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,215,0,0.1); display: flex; align-items: center; gap: 12px; }
        .logo-sm { width: 35px; height: 35px; border: 1.5px solid var(--warrior-gold); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; background: #000; }

        /* --- CARDS & SECTIONS --- */
        .container { padding: 0 20px 140px 20px; max-width: 600px; margin: auto; }
        .view { display: none; }
        .active-view { display: block; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Premium Card Styles */
        .card { background: rgba(255,255,255,0.03); border-radius: 28px; overflow: hidden; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(5px); }
        .card img { width: 100%; height: 230px; object-fit: cover; border-bottom: 2px solid var(--warrior-gold); }
        .card-body { padding: 22px; }
        .card-h { font-size: 20px; color: var(--warrior-gold); margin-bottom: 10px; font-family: 'Philosopher', sans-serif; }
        .card-p { font-size: 14px; color: #CBD5E1; line-height: 1.7; }

        /* Mantra Section Specific Style */
        .mantra-box { background: linear-gradient(rgba(211, 84, 0, 0.1), rgba(0,0,0,0)); padding: 30px; border-radius: 30px; text-align: center; border: 1px dashed rgba(255, 215, 0, 0.3); margin-bottom: 25px; }
        .mantra-text { font-family: 'Philosopher', sans-serif; font-size: 22px; color: #FFF; line-height: 1.5; text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }

        /* --- NAVIGATION --- */
        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 94%; height: 75px; background: #000; border-radius: 30px; display: flex; align-items: center; border: 1px solid rgba(255,215,0,0.3); z-index: 2000; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .nav-item { color: #4B5563; font-size: 9px; font-weight: 700; text-align: center; flex: 1; transition: 0.3s; }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 3px; }
        .active { color: var(--warrior-gold); }
        .active i { transform: scale(1.2); text-shadow: 0 0 15px var(--warrior-gold); }
    </style>
</head>
<body>

    <div id="splash">
        <div class="dharmachakra">☸️</div>
        <div class="intro-msg">धर्मक्षेत्रे कुरुक्षेत्रे</div>
    </div>

    <header>
        <div class="logo-sm">🚩</div>
        <h1 id="v-title">Great Warriors</h1>
    </header>

    <div class="welcome-header">
        <h2>WELCOME TO</h2>
        <h1>BHARATIYA ITIHAS</h1>
    </div>

    <div class="container">
        <div id="bios" class="view active-view"></div>
        <div id="gita" class="view"></div>
        <div id="morals" class="view"></div>
        <div id="mantras" class="view"></div>
        <div id="places" class="view"></div>
    </div>

    <nav>
        <div class="nav-item active" onclick="sw('bios', 'Warriors', this)"><i>⚔️</i>Bios</div>
        <div class="nav-item" onclick="sw('gita', 'Gita Upadesh', this)"><i>☸️</i>Gita</div>
        <div class="nav-item" onclick="sw('mantras', 'Sacred Mantras', this)"><i>📿</i>Mantras</div>
        <div class="nav-item" onclick="sw('places', 'Spiritual Places', this)"><i>🕌</i>Places</div>
        <div class="nav-item" onclick="sw('morals', 'Niti Katha', this)"><i>📜</i>Morals</div>
    </nav>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => { document.getElementById('splash').classList.add('splash-hidden'); }, 2500);
            render();
        });

        function render() {
            const data = JSON.parse(localStorage.getItem('my_app_db')) || { bios: [], gita: [], morals: [], mantras: [], places: [] };
            Object.keys(data).forEach(cat => {
                const con = document.getElementById(cat);
                if(!con) return;
                con.innerHTML = "";
                data[cat].forEach(item => {
                    if(cat === 'mantras') {
                        con.innerHTML += `<div class="mantra-box"><div class="mantra-text">${item.t}</div><p style="margin-top:15px; color:#94A3B8; font-size:13px;">${item.d}</p></div>`;
                    } else {
                        con.innerHTML += `
                            <div class="card">
                                ${item.i ? `<img src="${item.i}">` : ''}
                                <div class="card-body">
                                    <h3 class="card-h">${item.t}</h3>
                                    <p class="card-p">${item.d}</p>
                                    ${item.m ? `<div style="margin-top:10px; color:var(--warrior-gold); font-size:12px;">✧ ${item.m}</div>` : ''}
                                </div>
                            </div>`;
                    }
                });
            });
        }

        function sw(id, title, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-view');
            el.classList.add('active');
            document.getElementById('v-title').innerText = title;
            window.scrollTo({top:0, behavior:'smooth'});
        }
        window.onfocus = render;
    </script>
</body>
</html>
